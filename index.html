<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="theme-color" content="#0f1117" id="themeColorMeta"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="VoltRadar"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>VoltRadar ⚡</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    :root {
      --bg:     #0f1117;
      --bg2:    #1a1d27;
      --bg3:    #22253a;
      --border: #2a2d3a;
      --text:   #e0e0e0;
      --text2:  #aaa;
      --text3:  #666;
      --accent: #4f6ef7;
      --accent-h: #3a57e8;
      --chover: #20233a;
      --cactive:#1e2547;
      --green:  #4caf50; --green-bg: #1a3a2a;
      --red:    #f44336; --red-bg:   #3a1a1a;
      --yellow: #ffc107; --yellow-bg:#3a2d1a;
      --blue:   #4f9ef7; --blue-bg:  #1a2a3a;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    body.light {
      --bg:#f0f2f5; --bg2:#fff; --bg3:#e8eaed; --border:#d0d3db;
      --text:#1a1a2e; --text2:#555; --text3:#999;
      --chover:#f5f7ff; --cactive:#e8edff;
      --green-bg:#e8f5e9; --red-bg:#ffebee; --yellow-bg:#fff8e1; --blue-bg:#e3f2fd;
    }

    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;height:100dvh;transition:background .2s,color .2s;overflow:hidden;}

    /* ── Header ── */
    header{background:var(--bg2);padding:calc(11px + var(--safe-top)) 18px 11px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0;}
    header .logo{font-size:22px;}
    header h1{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px;}
    header p{font-size:11px;color:var(--text3);margin-top:1px;}
    .header-right{margin-left:auto;display:flex;gap:6px;}
    .icon-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:.15s;}
    .icon-btn:hover{background:var(--border);}

    /* ── Controls ── */
    .controls{background:var(--bg2);padding:7px 14px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0;}
    .search-wrap{display:flex;flex:1;min-width:180px;}
    .search-wrap input{flex:1;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-right:none;padding:8px 11px;border-radius:8px 0 0 8px;font-size:16px;outline:none;}
    .search-wrap input::placeholder{color:var(--text3);}
    .search-wrap input:focus{border-color:var(--accent);}
    .search-wrap button{background:var(--accent);color:#fff;border:none;padding:6px 13px;border-radius:0 8px 8px 0;cursor:pointer;font-size:14px;transition:.15s;}
    .search-wrap button:hover{background:var(--accent-h);}
    .btn{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;transition:.15s;}
    .btn:hover{background:var(--accent-h);}
    .btn:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed;}
    .csel{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:8px 9px;border-radius:8px;font-size:13px;cursor:pointer;}
    .status-text{font-size:11px;color:var(--text3);margin-left:auto;white-space:nowrap;}

    /* ── Layout ── */
    .main{display:flex;flex:1;overflow:hidden;position:relative;min-height:0;}

    /* ── Mobile view toggle (hidden on desktop) ── */
    .view-toggle{display:none;}

    /* ── Sidebar ── */
    .sidebar{width:310px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
    .sb-header{padding:9px 13px;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .count-badge{background:var(--accent);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;}
    .fav-filter{font-size:12px;color:var(--text3);cursor:pointer;padding:5px 9px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);transition:.15s;}
    .fav-filter.active{background:#ffc10722;color:var(--yellow);border-color:var(--yellow);}
    .station-list{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}
    .station-list::-webkit-scrollbar{width:3px;}
    .station-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    /* ── Cards ── */
    .station-card{padding:11px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
    .station-card:hover{background:var(--chover);}
    .station-card.active{background:var(--cactive);border-left:3px solid var(--accent);}
    .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:5px;}
    .card-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
    .fav-btn{background:none;border:none;cursor:pointer;font-size:16px;line-height:1;color:var(--text3);flex-shrink:0;padding:2px 4px;transition:transform .15s;}
    .fav-btn:hover{transform:scale(1.2);}
    .fav-btn.active{color:#ffc107;}
    .card-addr{font-size:11px;color:var(--text3);margin:3px 0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .card-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;}
    .badge{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:500;}
    .badge-green{background:var(--green-bg);color:var(--green);}
    .badge-red{background:var(--red-bg);color:var(--red);}
    .badge-gray{background:var(--bg3);color:var(--text3);}
    .badge-blue{background:var(--blue-bg);color:var(--blue);}
    .badge-yellow{background:var(--yellow-bg);color:var(--yellow);}
    .card-footer{display:flex;justify-content:space-between;align-items:center;}
    .card-dist{font-size:11px;color:var(--text3);}
    .share-btn{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 7px;border-radius:4px;transition:.12s;}
    .share-btn:hover{background:var(--bg3);color:var(--text);}

    /* ── Map ── */
    #map{flex:1;}

    /* ── Detail panel ── */
    .detail-panel{width:0;overflow:hidden;background:var(--bg2);border-left:1px solid var(--border);transition:width .25s ease;flex-shrink:0;display:flex;flex-direction:column;}
    .detail-panel.open{width:290px;}
    .detail-inner{width:290px;padding:15px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    .detail-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);line-height:1;padding:0 4px;}
    .detail-close:hover{color:var(--text);}
    .detail-title{font-size:15px;font-weight:700;color:var(--text);margin:4px 0 3px;line-height:1.3;}
    .detail-addr{font-size:11px;color:var(--text3);margin-bottom:11px;}
    .detail-section{margin-bottom:13px;}
    .detail-section h4{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:6px;}
    .detail-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);color:var(--text2);}
    .detail-row strong{color:var(--text);}
    .conn-item{background:var(--bg3);border-radius:8px;padding:7px 9px;margin-bottom:5px;}
    .conn-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px;}
    .conn-detail{font-size:11px;color:var(--text3);}
    .detail-link{display:block;margin-top:10px;font-size:12px;color:var(--accent);text-decoration:none;}
    .detail-link:hover{text-decoration:underline;}

    /* ── Empty / loading ── */
    .empty{padding:36px 14px;text-align:center;color:var(--text3);}
    .empty .icon{font-size:34px;margin-bottom:9px;}
    .empty p{font-size:12px;line-height:1.6;}
    .empty .btn{margin-top:14px;}
    .loading{padding:28px 14px;text-align:center;color:var(--text3);font-size:12px;}
    .spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── Leaflet popup ── */
    .leaflet-popup-content-wrapper{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:10px;box-shadow:0 4px 18px rgba(0,0,0,.4);}
    .leaflet-popup-tip{background:var(--bg2);}
    .popup-title{font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text);}
    .popup-row{font-size:11px;color:var(--text2);margin-bottom:2px;}
    .popup-row strong{color:var(--text);}

    /* ── Toast ── */
    .toast{position:fixed;bottom:calc(18px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:9999;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* ══════════════════════════════════════════════════════════
       RESPONSIVO — smartphones (iPhone 11 e acima, Android, etc.)
       ══════════════════════════════════════════════════════════ */
    @media (max-width: 760px) {
      header{padding:calc(9px + var(--safe-top)) 14px 9px;}
      header h1{font-size:16px;}
      header p{display:none;}                 /* poupar espaço vertical */

      .controls{padding:8px 10px;gap:6px;}
      .search-wrap{order:-1;flex-basis:100%;min-width:0;}  /* pesquisa em cima, largura total */
      .status-text{display:none;}
      .csel,.btn{flex:1;min-width:0;text-align:center;}     /* botões/menus dividem a linha */

      /* Empilhar mapa + lista verticalmente */
      .main{flex-direction:column;}
      #map{order:1;width:100%;height:44vh;min-height:230px;flex:0 0 auto;}
      .sidebar{order:2;width:100%;flex:1 1 auto;min-height:0;border-right:none;border-top:1px solid var(--border);}

      /* Alternar entre Lista e Mapa */
      .view-toggle{display:flex;flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);}
      .view-toggle button{flex:1;background:none;border:none;color:var(--text2);padding:10px;font-size:13px;font-weight:600;cursor:pointer;border-top:2px solid transparent;}
      .view-toggle button.active{color:var(--accent);border-top-color:var(--accent);}

      /* Modos: mostrar só mapa OU só lista */
      body.show-map .sidebar{display:none;}
      body.show-map #map{height:100%;flex:1 1 auto;}
      body.show-list #map{display:none;}
      body.show-list .sidebar{flex:1 1 auto;}

      /* Painel de detalhe = folha que sobe de baixo */
      .detail-panel{position:fixed;left:0;right:0;bottom:0;top:auto;width:100% !important;height:0;
        border-left:none;border-top:1px solid var(--border);border-radius:16px 16px 0 0;
        box-shadow:0 -6px 24px rgba(0,0,0,.4);z-index:1200;transition:height .25s ease;}
      .detail-panel.open{height:auto;max-height:78vh;}
      .detail-inner{width:100%;padding:18px 16px calc(18px + var(--safe-bot));}
      .detail-close{font-size:26px;}
    }
  </style>
</head>
<body class="show-map">

<div class="toast" id="toast"></div>

<header>
  <div class="logo">⚡</div>
  <div>
    <h1>VoltRadar</h1>
    <p>Carregadores EV · disponibilidade, preços e potência — em todo o mundo</p>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Modo claro/escuro">🌙</button>
  </div>
</header>

<div class="controls">
  <button class="btn" id="locBtn" onclick="locateMe()">📍 Localização</button>

  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="Pesquisar cidade ou morada..."
      onkeydown="if(event.key==='Enter') searchLocation()"/>
    <button onclick="searchLocation()">🔍</button>
  </div>

  <select class="csel" id="radiusSelect" onchange="onRadiusChange()">
    <option value="5">5 km</option>
    <option value="10" selected>10 km</option>
    <option value="25">25 km</option>
    <option value="50">50 km</option>
    <option value="100">100 km</option>
    <option value="250">250 km</option>
    <option value="pt">🇵🇹 Portugal</option>
    <option value="world">🌍 Mundo</option>
  </select>

  <select class="csel" id="connectorFilter" onchange="applyFilters()">
    <option value="">Todos os conectores</option>
  </select>

  <select class="csel" id="powerFilter" onchange="applyFilters()">
    <option value="0">Todas as potências</option>
    <option value="7">≥ 7 kW</option>
    <option value="22">≥ 22 kW</option>
    <option value="50">≥ 50 kW (rápido)</option>
    <option value="100">≥ 100 kW (ultra-rápido)</option>
    <option value="150">≥ 150 kW</option>
  </select>

  <select class="csel" id="sortSelect" onchange="applyFilters()">
    <option value="distance">↕ Distância</option>
    <option value="power">↕ Potência</option>
    <option value="name">↕ Nome</option>
  </select>

  <span class="status-text" id="statusText">Pesquisa ou usa a localização</span>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sb-header">
      <span>Estações <span class="count-badge" id="countBadge">0</span></span>
      <button class="fav-filter" id="favFilterBtn" onclick="toggleFavFilter()">⭐ Favoritos</button>
    </div>
    <div class="station-list" id="stationList">
      <div class="empty">
        <div class="icon">🗺️</div>
        <p>Usa a localização ou pesquisa<br/>uma cidade para começar.</p>
      </div>
    </div>
  </div>

  <div id="map"></div>

  <div class="detail-panel" id="detailPanel">
    <div class="detail-inner" id="detailInner"></div>
  </div>
</div>

<!-- Alternador Lista/Mapa (só telemóvel) -->
<div class="view-toggle">
  <button id="tabMap"  class="active" onclick="setView('map')">🗺️ Mapa</button>
  <button id="tabList" onclick="setView('list')">📋 Lista</button>
</div>

<script>
// ── State ─────────────────────────────────────────────────────
let userLat = null, userLng = null;
let allStations = [], stations = [];
let markers = {}, userMarker = null;
let activeCardId = null, showFavsOnly = false;
let favorites = JSON.parse(localStorage.getItem('vr_favorites') || '[]');
let lastQuery = null;

// ── Map ───────────────────────────────────────────────────────
const map = L.map('map').setView([39.5, -8.0], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
  maxZoom: 19
}).addTo(map);

const mkGreen  = mkIcon('#4caf50', 14);
const mkBlue   = mkIcon('#4f9ef7', 14);
const mkGray   = mkIcon('#888', 11);
const mkRed    = mkIcon('#f44336', 12);
const mkYellow = mkIcon('#ffc107', 12);

function mkIcon(color, size) {
  return L.divIcon({
    className: '',
    html: `<div style="background:${color};width:${size}px;height:${size}px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 5px ${color}88"></div>`,
    iconSize: [size, size], iconAnchor: [size/2, size/2]
  });
}

// ── Mobile view toggle ────────────────────────────────────────
const isMobile = () => window.matchMedia('(max-width: 760px)').matches;

function setView(v) {
  document.body.classList.toggle('show-map', v === 'map');
  document.body.classList.toggle('show-list', v === 'list');
  document.getElementById('tabMap').classList.toggle('active', v === 'map');
  document.getElementById('tabList').classList.toggle('active', v === 'list');
  if (v === 'map') setTimeout(() => map.invalidateSize(), 60);
}

// Garante que o Leaflet recalcula o tamanho quando o ecrã muda
window.addEventListener('resize', () => setTimeout(() => map.invalidateSize(), 150));
window.addEventListener('orientationchange', () => setTimeout(() => map.invalidateSize(), 300));

// No arranque: telemóvel começa em modo Mapa; desktop mostra tudo
if (!isMobile()) document.body.classList.remove('show-map');
setTimeout(() => map.invalidateSize(), 200);
// Lembra a última pesquisa (se existir) e recarrega-a
setTimeout(restoreLast, 250);

// Regista o service worker — necessário para instalar como app (PWA)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// ── Theme ─────────────────────────────────────────────────────
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
  document.getElementById('themeColorMeta').content = isLight ? '#f0f2f5' : '#0f1117';
}

// ── Geolocation ───────────────────────────────────────────────
function locateMe() {
  const btn = document.getElementById('locBtn');
  btn.disabled = true; btn.textContent = '⏳ A localizar...';
  setStatus('A obter localização...');
  if (!navigator.geolocation) { toast('Geolocalização não suportada.'); btn.disabled = false; btn.textContent = '📍 Localização'; return; }
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude; userLng = pos.coords.longitude;
    placeUserMarker(userLat, userLng);
    map.setView([userLat, userLng], 13);
    setTimeout(() => map.invalidateSize(), 100);
    btn.disabled = false; btn.textContent = '📍 Localização';
    fetchByRadius(userLat, userLng);
  }, () => {
    userLat = 38.7169; userLng = -9.1399;
    placeUserMarker(userLat, userLng);
    map.setView([userLat, userLng], 12);
    btn.disabled = false; btn.textContent = '📍 Localização';
    fetchByRadius(userLat, userLng);
    setStatus('Localização indisponível — a usar Lisboa');
  }, { timeout: 10000, enableHighAccuracy: true });
}

function placeUserMarker(lat, lng) {
  if (userMarker) map.removeLayer(userMarker);
  userMarker = L.circleMarker([lat, lng], {
    radius: 9, color: '#4f6ef7', fillColor: '#4f6ef7', fillOpacity: 1, weight: 3, opacity: 0.4
  }).addTo(map).bindPopup('📍 A tua localização');
}

// ── Search location ───────────────────────────────────────────
async function searchLocation() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  setStatus('A pesquisar...');
  if (isMobile()) setView('map');
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`);
    const data = await res.json();
    if (!data.length) { toast('Local não encontrado.'); setStatus('Local não encontrado.'); return; }
    userLat = parseFloat(data[0].lat); userLng = parseFloat(data[0].lon);
    placeUserMarker(userLat, userLng);
    map.setView([userLat, userLng], 12);
    setTimeout(() => map.invalidateSize(), 100);
    fetchByRadius(userLat, userLng);
  } catch(e) { toast('Erro na pesquisa.'); }
}

// ── Radius change ─────────────────────────────────────────────
function onRadiusChange() {
  const v = document.getElementById('radiusSelect').value;
  if (v === 'pt') fetchPortugal();
  else if (v === 'world') fetchWorld(userLat||39.5, userLng||-8.0);
  else if (userLat) fetchByRadius(userLat, userLng);
}

// ── Lembrar última pesquisa ───────────────────────────────────
function saveLast() {
  try {
    localStorage.setItem('vr_lastLoc', JSON.stringify({
      lat: userLat, lng: userLng,
      q:   document.getElementById('searchInput').value,
      r:   document.getElementById('radiusSelect').value
    }));
  } catch(e) {}
}

function restoreLast() {
  let d;
  try { d = JSON.parse(localStorage.getItem('vr_lastLoc') || 'null'); } catch(e) {}
  if (!d || d.lat == null) return;
  userLat = d.lat; userLng = d.lng;
  if (d.q) document.getElementById('searchInput').value = d.q;
  if (d.r) document.getElementById('radiusSelect').value = d.r;
  placeUserMarker(userLat, userLng);
  map.setView([userLat, userLng], 13);
  setTimeout(() => map.invalidateSize(), 100);
  fetchByRadius(userLat, userLng);
}

// ── Fetch (Overpass / OpenStreetMap) ──────────────────────────
// Vários servidores Overpass: tenta o principal e, se estiver ocupado
// (429/503/504) ou em baixo, faz retry com espera e passa a um espelho.
const OVERPASS_ENDPOINTS = [
  'https://overpass-api.de/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter',
  'https://overpass.private.coffee/api/interpreter'
];
const MAX_ATTEMPTS = 5;
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function overpassQuery(query, onRetry) {
  let lastErr = 'sem resposta do servidor';
  for (let attempt = 0; attempt < MAX_ATTEMPTS; attempt++) {
    const ep = OVERPASS_ENDPOINTS[Math.min(attempt, OVERPASS_ENDPOINTS.length - 1)];
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 28000);
    try {
      const res = await fetch(ep, { method:'POST', body:'data=' + encodeURIComponent(query), signal: ctrl.signal });
      clearTimeout(timer);
      if (res.status === 429 || res.status === 503 || res.status === 504) {
        lastErr = 'servidor ocupado (' + res.status + ')';
        if (onRetry) onRetry(attempt + 1);
        await sleep(1300 * (attempt + 1));
        continue;
      }
      if (!res.ok) { lastErr = 'HTTP ' + res.status; await sleep(900); continue; }
      const text = await res.text();
      if (text.trim().startsWith('<')) { lastErr = 'resposta inválida do servidor'; await sleep(900); continue; }
      return JSON.parse(text);
    } catch (e) {
      clearTimeout(timer);
      lastErr = (e.name === 'AbortError') ? 'tempo esgotado' : e.message;
      if (onRetry) onRetry(attempt + 1);
      await sleep(900);
    }
  }
  throw new Error(lastErr);
}

async function fetchByRadius(lat, lng) {
  const r = document.getElementById('radiusSelect').value;
  if (r === 'pt')    { fetchPortugal(); return; }
  if (r === 'world') { fetchWorld(lat, lng); return; }
  const rm = parseFloat(r) * 1000;
  const q = `[out:json][timeout:25];(node["amenity"="charging_station"](around:${rm},${lat},${lng});way["amenity"="charging_station"](around:${rm},${lat},${lng}););out body center qt;`;
  await doFetch(q, lat, lng, `${r} km`);
}

async function fetchPortugal() {
  map.setView([39.5, -8.0], 7);
  const lat = userLat||39.5, lng = userLng||-8.0;
  const q = `[out:json][timeout:60];area["ISO3166-1"="PT"][admin_level=2]->.pt;(node["amenity"="charging_station"](area.pt);way["amenity"="charging_station"](area.pt););out body center qt;`;
  await doFetch(q, lat, lng, 'Portugal 🇵🇹');
}

async function fetchWorld(lat, lng) {
  map.setView([20, 0], 2);
  const q = `[out:json][timeout:60];node["amenity"="charging_station"];out body 500;`;
  await doFetch(q, lat, lng, 'Mundo 🌍');
}

async function doFetch(query, refLat, refLng, label) {
  lastQuery = { query, refLat, refLng, label };
  setStatus('A carregar...'); showLoading();
  try {
    const data = await overpassQuery(query, n => {
      setStatus(`Servidor ocupado — a tentar de novo (${n})...`);
    });
    allStations = (data.elements || [])
      .filter(e => e.type === 'node' || (e.type === 'way' && e.center))
      .map(e => enrichStation(e, refLat, refLng));
    updateConnectorFilter();
    applyFilters();
    setStatus(`${allStations.length} estações — ${label}`);
    saveLast();
    checkHash();
  } catch(e) {
    setStatus('Servidor OSM ocupado — tenta novamente.');
    showError(e.message);
  }
}

function retryLast() {
  if (lastQuery) doFetch(lastQuery.query, lastQuery.refLat, lastQuery.refLng, lastQuery.label);
}

// ── Enrich (OSM tags) ─────────────────────────────────────────
const SOCKET_MAP = {
  'socket:type2':             'Type 2 (AC)',
  'socket:type2_combo':       'CCS Combo 2 (DC)',
  'socket:chademo':           'CHAdeMO',
  'socket:type1':             'Type 1 (AC)',
  'socket:type2_cable':       'Type 2 Cabo',
  'socket:tesla_supercharger':'Tesla Supercharger',
  'socket:tesla_destination': 'Tesla Destination',
  'socket:schuko':            'Schuko',
  'socket:type3c':            'Type 3c',
};

function parseKw(str) {
  if (!str) return 0;
  const km = str.match(/([\d.]+)\s*[kK][wW]/); if (km) return parseFloat(km[1]);
  const wm = str.match(/([\d.]+)\s*[wW]/);     if (wm) return parseFloat(wm[1]) / 1000;
  return 0;
}

function enrichStation(e, refLat, refLng) {
  const tags = e.tags || {};
  const lat  = e.lat  ?? e.center?.lat;
  const lng  = e.lon  ?? e.center?.lon;
  const distKm = (lat && lng) ? haversine(refLat, refLng, lat, lng) : 9999;

  const connTypes = [], connections = [];
  Object.entries(SOCKET_MAP).forEach(([key, name]) => {
    if (!tags[key] || tags[key] === 'no') return;
    connTypes.push(name);
    const qty = parseInt(tags[key]) || 1;
    const kw  = parseKw(tags[key + ':output']);
    connections.push({ ConnectionType: { Title: name }, Quantity: qty, PowerKW: kw || null });
  });
  let maxKw = connections.reduce((m, c) => Math.max(m, c.PowerKW||0), 0);
  if (!maxKw) maxKw = parseKw(tags['maxpower:electric'] || tags['charging_station:output'] || '');

  const street = tags['addr:street'] ? (tags['addr:street'] + (tags['addr:housenumber'] ? ' ' + tags['addr:housenumber'] : '')) : null;
  const address = [street, tags['addr:city'], tags['addr:country']].filter(Boolean).join(', ');

  let statusLabel = 'Público', statusClass = 'badge-green';
  const acc = tags.access;
  if (acc === 'private')   { statusLabel = 'Privado';   statusClass = 'badge-red'; }
  else if (acc === 'customers') { statusLabel = 'Clientes'; statusClass = 'badge-yellow'; }
  else if (acc === 'permissive') { statusLabel = 'Público'; statusClass = 'badge-green'; }

  let cost = null;
  if (tags.fee === 'no') cost = 'Gratuito';
  else if (tags.fee === 'yes') cost = tags.charge || 'Pago';

  const numPoints = parseInt(tags.capacity) || connections.reduce((s, c) => s + (c.Quantity||1), 0) || 1;

  return {
    id:   e.id,
    name: tags.name || tags.operator || tags.brand || `Carregador #${e.id}`,
    address,
    lat, lng, distKm, maxKw, connTypes, connections,
    statusLabel, statusClass,
    cost,
    operator: tags.operator || tags.brand || null,
    numPoints,
    phone: tags.phone || tags['contact:phone'] || null,
    url:   tags.website || tags['contact:website'] || null
  };
}

// ── Connector filter ──────────────────────────────────────────
function updateConnectorFilter() {
  const all = new Set(allStations.flatMap(s => s.connTypes));
  const sel = document.getElementById('connectorFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Todos os conectores</option>';
  [...all].sort().forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    if (c === cur) o.selected = true;
    sel.appendChild(o);
  });
}

// ── Filter & sort ─────────────────────────────────────────────
function applyFilters() {
  const connF  = document.getElementById('connectorFilter').value;
  const powerF = parseFloat(document.getElementById('powerFilter').value) || 0;
  const sort   = document.getElementById('sortSelect').value;

  stations = allStations.filter(s => {
    if (connF  && !s.connTypes.includes(connF)) return false;
    if (powerF && s.maxKw < powerF) return false;
    if (showFavsOnly && !favorites.includes(s.id)) return false;
    return true;
  });

  if (sort === 'distance') stations.sort((a, b) => a.distKm - b.distKm);
  if (sort === 'power')    stations.sort((a, b) => b.maxKw - a.maxKw);
  if (sort === 'name')     stations.sort((a, b) => a.name.localeCompare(b.name));

  document.getElementById('countBadge').textContent = stations.length;
  renderList();
  syncMarkers();
}

// ── Render list ───────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('stationList');
  list.innerHTML = '';
  if (!stations.length) {
    list.innerHTML = `<div class="empty"><div class="icon">🔌</div><p>Sem estações para os filtros seleccionados.</p></div>`;
    return;
  }
  stations.forEach(s => {
    const isFav  = favorites.includes(s.id);
    const kwLabel = s.maxKw ? `${s.maxKw} kW` : '? kW';
    const costBadge = s.cost
      ? `<span class="badge badge-yellow" title="${s.cost}">💰 ${s.cost.substring(0,22)}${s.cost.length>22?'…':''}</span>`
      : `<span class="badge badge-gray">Preço s/info</span>`;

    const card = document.createElement('div');
    card.className = 'station-card' + (activeCardId === s.id ? ' active' : '');
    card.id = `card-${s.id}`;
    card.innerHTML = `
      <div class="card-top">
        <div class="card-name" title="${s.name}">${s.name}</div>
        <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav(event,${s.id})">${isFav?'⭐':'☆'}</button>
      </div>
      <div class="card-addr">${s.address||'—'}</div>
      <div class="card-meta">
        <span class="badge ${s.statusClass}">${s.statusLabel}</span>
        <span class="badge badge-blue">⚡ ${kwLabel}</span>
        <span class="badge badge-gray">🔌 ${s.numPoints}</span>
        ${costBadge}
      </div>
      <div class="card-footer">
        <span class="card-dist">📍 ${s.distKm<9999?s.distKm.toFixed(1)+' km':'—'}${s.operator?' · '+s.operator:''}</span>
        <button class="share-btn" onclick="shareStation(event,${s.id})">🔗 Partilhar</button>
      </div>`;
    card.onclick = e => { if (!e.target.closest('button')) selectStation(s); };
    list.appendChild(card);
  });
}

// ── Markers ───────────────────────────────────────────────────
function syncMarkers() {
  const vis = new Set(stations.map(s => s.id));
  Object.entries(markers).forEach(([id, m]) => {
    if (!vis.has(parseInt(id))) { map.removeLayer(m); delete markers[id]; }
  });
  stations.forEach(s => {
    if (!s.lat || !s.lng || markers[s.id]) return;
    const icon = s.statusClass === 'badge-green' ? mkGreen
               : s.statusClass === 'badge-red'   ? mkRed
               : s.statusClass === 'badge-yellow' ? mkYellow
               : mkGray;
    const m = L.marker([s.lat, s.lng], { icon }).addTo(map).bindPopup(buildPopup(s), { maxWidth: 220 });
    m.on('click', () => selectStation(s));
    markers[s.id] = m;
  });
}

function buildPopup(s) {
  return `<div class="popup-title">${s.name}</div>
    <div class="popup-row">${s.address||'—'}</div>
    <div class="popup-row"><strong>Estado:</strong> ${s.statusLabel}</div>
    <div class="popup-row"><strong>Potência:</strong> ${s.maxKw?s.maxKw+' kW':'?'}</div>
    <div class="popup-row"><strong>Pontos:</strong> ${s.numPoints}</div>
    ${s.cost?`<div class="popup-row"><strong>Preço:</strong> ${s.cost}</div>`:''}`;
}

// ── Select station ────────────────────────────────────────────
function selectStation(s) {
  if (activeCardId) document.getElementById(`card-${activeCardId}`)?.classList.remove('active');
  activeCardId = s.id;
  document.getElementById(`card-${s.id}`)?.classList.add('active');
  document.getElementById(`card-${s.id}`)?.scrollIntoView({ behavior:'smooth', block:'nearest' });
  if (isMobile()) setView('map');
  const m = markers[s.id];
  if (m) { map.flyTo([s.lat, s.lng], 15, { duration: 0.7 }); setTimeout(() => m.openPopup(), 800); }
  openDetail(s);
  history.replaceState(null, '', `#station=${s.id}`);
}

// ── Detail panel ──────────────────────────────────────────────
function openDetail(s) {
  document.getElementById('detailPanel').classList.add('open');
  const connectors = s.connections.map(c => {
    const type   = c.ConnectionType?.Title || '?';
    const detail = [c.Quantity?`${c.Quantity}×`:'', c.Voltage?`${c.Voltage}V`:'', c.Amperage?`${c.Amperage}A`:'', c.PowerKW?`${c.PowerKW} kW`:''].filter(Boolean).join(' · ');
    return `<div class="conn-item"><div class="conn-name">${type}</div>${detail?`<div class="conn-detail">${detail}</div>`:''}</div>`;
  }).join('');

  document.getElementById('detailInner').innerHTML = `
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div class="detail-title">${s.name}</div>
    <div class="detail-addr">${s.address||'—'}</div>
    <div class="detail-section">
      <h4>Informação</h4>
      <div class="detail-row"><span>Estado</span><strong>${s.statusLabel}</strong></div>
      <div class="detail-row"><span>Potência máx.</span><strong>${s.maxKw?s.maxKw+' kW':'?'}</strong></div>
      <div class="detail-row"><span>Pontos de carga</span><strong>${s.numPoints}</strong></div>
      ${s.operator?`<div class="detail-row"><span>Operador</span><strong>${s.operator}</strong></div>`:''}
      ${s.cost?`<div class="detail-row"><span>Preço</span><strong>${s.cost}</strong></div>`:''}
      ${s.phone?`<div class="detail-row"><span>Telefone</span><strong>${s.phone}</strong></div>`:''}
      <div class="detail-row"><span>Distância</span><strong>${s.distKm<9999?s.distKm.toFixed(1)+' km':'—'}</strong></div>
    </div>
    ${s.connections.length?`<div class="detail-section"><h4>Conectores (${s.connections.length})</h4>${connectors}</div>`:''}
    ${(s.lat&&s.lng)?`<a class="detail-link" href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}" target="_blank" rel="noopener">🧭 Abrir no Google Maps</a>`:''}
    ${s.url?`<a class="detail-link" href="${s.url}" target="_blank">🔗 Ver mais informação</a>`:''}`;
}

function closeDetail() { document.getElementById('detailPanel').classList.remove('open'); }

// ── Favorites ─────────────────────────────────────────────────
function toggleFav(e, id) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) favorites.push(id); else favorites.splice(idx, 1);
  localStorage.setItem('vr_favorites', JSON.stringify(favorites));
  renderList();
  toast(idx === -1 ? '⭐ Adicionado aos favoritos' : 'Removido dos favoritos');
}

function toggleFavFilter() {
  showFavsOnly = !showFavsOnly;
  document.getElementById('favFilterBtn').classList.toggle('active', showFavsOnly);
  applyFilters();
}

// ── Share ─────────────────────────────────────────────────────
function shareStation(e, id) {
  e.stopPropagation();
  const url = location.href.split('#')[0] + `#station=${id}`;
  if (navigator.share) { navigator.share({ title: 'VoltRadar', url }).catch(()=>{}); return; }
  navigator.clipboard?.writeText(url).then(() => toast('🔗 Link copiado!')).catch(() => toast('Não foi possível copiar.'));
}

// ── URL hash ──────────────────────────────────────────────────
function checkHash() {
  const m = location.hash.match(/#station=(\d+)/);
  if (!m) return;
  const s = allStations.find(x => x.id === parseInt(m[1]));
  if (s) selectStation(s);
}

// ── Helpers ───────────────────────────────────────────────────
function showLoading() {
  document.getElementById('stationList').innerHTML = `<div class="loading"><div class="spinner"></div>A carregar...</div>`;
  document.getElementById('countBadge').textContent = '…';
}
function showError(msg) {
  document.getElementById('stationList').innerHTML =
    `<div class="empty"><div class="icon">⚠️</div>
       <p>O servidor do OpenStreetMap está ocupado.<br/>${msg ? '('+msg+')<br/>' : ''}Tenta novamente.</p>
       <button class="btn" onclick="retryLast()">🔄 Tentar de novo</button>
     </div>`;
}
function setStatus(t) { document.getElementById('statusText').textContent = t; }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
function haversine(lat1, lon1, lat2, lon2) {
  const R=6371, d=x=>x*Math.PI/180, dLat=d(lat2-lat1), dLon=d(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(d(lat1))*Math.cos(d(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
